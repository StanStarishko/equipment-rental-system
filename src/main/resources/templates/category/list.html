<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Categories <a th:href="@{/help#categories}" class="help-link" title="Help">?</a></h1>
        <a th:href="@{/categories/new}" class="btn btn-primary">Add Category</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div th:if="${#lists.isEmpty(categories)}" class="empty-state">
            <p>No categories have been created yet.</p>
            <a th:href="@{/categories/new}" class="btn btn-primary">Create First Category</a>
        </div>

        <div th:unless="${#lists.isEmpty(categories)}" class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Equipment Count</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="category : ${categories}">
                        <td th:text="${category.id}">1</td>
                        <td th:text="${category.name}">Category</td>
                        <td th:text="${category.description}">Description</td>
                        <td th:text="${category.equipmentItems.size()}">0</td>
                        <td>
                            <div class="btn-group">
                                <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-sm btn-warning">Edit</a>
                                <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this category?');">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Users</h1>
        <a th:href="@{/users/new}" class="btn btn-primary">Add User</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div th:if="${#lists.isEmpty(users)}" class="empty-state">
            <p>No users have been registered yet.</p>
        </div>

        <div th:unless="${#lists.isEmpty(users)}" class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Department</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.fullName}">Name</td>
                        <td th:text="${user.username}">username</td>
                        <td><span class="badge" th:classappend="${user.role.name() == 'ADMIN'} ? 'badge-admin' : 'badge-staff'" th:text="${user.role}">STAFF</span></td>
                        <td th:text="${user.department}">Department</td>
                        <td th:text="${user.email}">email</td>
                        <td>
                            <div class="btn-group">
                                <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-warning">Edit</a>
                                <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this user?');">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

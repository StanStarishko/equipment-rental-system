<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${formTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1 th:text="${formTitle}">User Form</h1>
    </div>

    <div class="card">
        <form th:action="@{/users/save}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" th:field="*{firstName}" class="form-control"
                           th:errorclass="form-control-error">
                    <span class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">error</span>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" th:field="*{lastName}" class="form-control"
                           th:errorclass="form-control-error">
                    <span class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">error</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control"
                           th:errorclass="form-control-error">
                    <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">error</span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control"
                           th:errorclass="form-control-error">
                    <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">error</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" th:field="*{role}" class="form-control" th:errorclass="form-control-error">
                        <option value="">Select role...</option>
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}">ROLE</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}">error</span>
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" th:field="*{department}" class="form-control">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                           th:errorclass="form-control-error">
                    <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">error</span>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" th:field="*{phone}" class="form-control">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save User</button>
                <a th:href="@{/users}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
